<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 인력 배치 대시보드</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background-color: #f4f7f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: auto; }
        .header { background: #1a73e8; color: white; padding: 20px 30px; border-radius: 12px; margin-bottom: 25px; }
        .kpi-row { display: flex; gap: 15px; margin-bottom: 25px; }
        .kpi-card { flex: 1; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; border-top: 4px solid #1a73e8; }
        .kpi-value { font-size: 2.2em; font-weight: 800; color: #1a73e8; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 30px; }
        h2 { margin-top: 0; font-size: 1.4em; color: #1a73e8; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .filter-summary { margin-bottom: 15px; font-size: 1.1em; font-weight: 700; color: #1a73e8; background: #eef4ff; padding: 8px 15px; border-radius: 6px; display: inline-block; }
        .scroll-table { overflow-y: auto; border: 1px solid #eee; border-radius: 8px; width: 100%; max-height: 500px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background-color: #f9fafb; position: sticky; top: 0; padding: 12px; font-weight: 600; border-bottom: 2px solid #eaecf0; cursor: pointer; z-index: 10; }
        th:hover { background-color: #f1f3f4; }
        th::after { content: " ↕"; font-size: 0.8em; color: #ccc; margin-left: 5px; }
        td { padding: 12px; border-bottom: 1px solid #f2f4f7; font-size: 0.9em; }
        tr:hover { background-color: #fcfdfe; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .status-assigned { background: #e6f4ea; color: #1e8e3e; }
        .status-unassigned { background: #fce8e6; color: #d93025; }
        .badge-billable { background: #e8f0fe !important; color: #1967d2 !important; }
        .badge-non-billable { background: #fef7e0 !important; color: #b06000 !important; }
        .multi-select-box { max-height: 120px; overflow-y: auto; background: white; border: 1px solid #ddd; border-radius: 4px; padding: 10px; width: 300px; }
        #loading { text-align: center; padding: 50px; font-size: 1.5em; color: #1a73e8; }
    </style>
</head>
<body>
    <div id="loading">데이터를 실시간으로 불러오는 중입니다...</div>

    <div class="container" id="mainContent" style="display:none;">
        <div class="header"><h1>📊 인력 배치 실시간 현황 대시보드</h1></div>
        
        <div class="kpi-row">
            <div class="kpi-card"><div id="kpi-total" class="kpi-value">0</div><div>전체 인원(명)</div></div>
            <div class="kpi-card"><div id="kpi-assigned" class="kpi-value">0</div><div>투입 인원(명)</div></div>
            <div class="kpi-card"><div id="kpi-unassigned" class="kpi-value" style="color:#d93025">0</div><div>미투입 인원</div></div>
            <div class="kpi-card"><div id="kpi-mm" class="kpi-value">0</div><div>총 공수(M/M)</div></div>
        </div>

        <div class="card">
            <h2>👤 전체 인원 명단</h2>
            <div id="filterCount" class="filter-summary">조회 결과: 총 0명</div>
            <div style="display:flex; gap:20px; margin-bottom:20px; background:#f8f9fa; padding:15px; border-radius:8px;">
                <div><label style="font-size:0.8em; font-weight:bold">이름 검색</label><br><input type="text" id="nameSearch" placeholder="이름 입력..." oninput="renderTable()"></div>
                <div><label style="font-size:0.8em; font-weight:bold">부서 필터</label><div class="multi-select-box" id="deptFilterBox"></div></div>
                <div><label style="font-size:0.8em; font-weight:bold">투입 상태</label><br><select id="statusSelect" onchange="renderTable()"><option value="">전체</option><option value="투입">투입 중</option><option value="미투입">미투입</option></select></div>
            </div>
            <div class="scroll-table">
                <table id="peopleTable">
                    <thead>
                        <tr>
                            <th onclick="sortTable(0, 'peopleTable')">이름</th>
                            <th onclick="sortTable(1, 'peopleTable')">부서</th>
                            <th onclick="sortTable(2, 'peopleTable')">직급</th>
                            <th onclick="sortTable(3, 'peopleTable')">직무/등급</th>
                            <th onclick="sortTable(4, 'peopleTable')">상태</th>
                            <th onclick="sortTable(5, 'peopleTable')">M/M</th>
                            <th onclick="sortTable(6, 'peopleTable')">투입 프로젝트명</th>
                        </tr>
                    </thead>
                    <tbody id="peopleTbody"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>🚀 프로젝트 목록</h2>
            <div class="scroll-table">
                <table id="projectTable">
                    <thead>
                        <tr>
                            <th onclick="sortTable(0, 'projectTable')">코드</th>
                            <th onclick="sortTable(1, 'projectTable')">프로젝트명</th>
                            <th onclick="sortTable(2, 'projectTable')">구분</th>
                            <th onclick="sortTable(3, 'projectTable')">M/M</th>
                        </tr>
                    </thead>
                    <tbody id="projectTbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1am_r2BuqSqFnAvRnhb5wIXQOIC9kGQR97F45aCDReKk';
        const SAFE_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

        let peopleList = [];
        let globalProjectList = [];

        window.onload = function() {
            Papa.parse(SAFE_CSV_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    if(results.data && results.data.length > 0) {
                        processData(results.data);
                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('mainContent').style.display = 'block';
                    }
                }
            });
        };

        function processData(data) {
            const peopleMap = {};
            const projects = {};
            let totalMM = 0;

            data.forEach(row => {
                const name = row['이름'];
                if(!name) return;
                const mm = parseFloat(row['4월']) || 0;
                
                // 인원 맵 구축
                if(!peopleMap[name]) {
                    peopleMap[name] = {
                        name: name,
                        dept: row['부서'] ? row['부서'].split('/').pop() : '-',
                        pos: row['직급'] || '-',
                        info: (row['직무'] || '-') + '/' + (row['등급'] || '-'),
                        mm: 0,
                        projects: new Set()
                    };
                }
                peopleMap[name].mm += mm;
                if(row['프로젝트명'] && row['프로젝트명'] !== '-') peopleMap[name].projects.add(row['프로젝트명']);

                // 프로젝트 맵 구축
                if(row['프로젝트 코드'] && row['프로젝트 코드'] !== '-') {
                    const pCode = row['프로젝트 코드'];
                    if(!projects[pCode]) {
                        projects[pCode] = { code: pCode, name: row['프로젝트명'], type: row['프로젝트 구분'], mm: 0 };
                    }
                    projects[pCode].mm += mm;
                    totalMM += mm;
                }
            });

            peopleList = Object.values(peopleMap).map(p => ({
                ...p,
                status: p.mm > 0 ? '투입' : '미투입',
                projectStr: Array.from(p.projects).join(', ') || '-'
            }));

            globalProjectList = Object.values(projects).sort((a, b) => b.mm - a.mm);

            // KPI 업데이트
            document.getElementById('kpi-total').innerText = peopleList.length;
            document.getElementById('kpi-assigned').innerText = peopleList.filter(p => p.status === '투입').length;
            document.getElementById('kpi-unassigned').innerText = peopleList.filter(p => p.status === '미투입').length;
            document.getElementById('kpi-mm').innerText = totalMM.toFixed(2);

            // 부서 필터 구성
            const depts = [...new Set(peopleList.map(p => p.dept))].sort();
            document.getElementById('deptFilterBox').innerHTML = depts.map(d => 
                `<label style="display:block"><input type="checkbox" name="dept"
